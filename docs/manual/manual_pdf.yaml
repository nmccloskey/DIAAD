# ==========================================================
# DIAAD Instruction Manual – PDF Compilation Config
# ==========================================================

title: "DIAAD Instruction Manual"
subtitle: "Database-oriented, Integrative Architecture for Analyzing Discourse"
author: "Nick McCloskey"
date: "Version 1.0.7"

geometry: margin=3cm
fontsize: 11pt
linestretch: 1.15
papersize: letter

titlepage: true
titlepage-color: "FFFFFF"
titlepage-text-color: "000000"
titlepage-rule-height: 1

toc: true
toc-depth: 3
numbersections: true

header-includes:
  - \usepackage{etoolbox}
  - \apptocmd{\tableofcontents}{\clearpage}{}{}
  - \usepackage{fancyhdr}
  - \pagestyle{fancy}
  - \fancyfoot[C]{\thepage}
  - \fancyhead[L]{DIAAD Manual}
  - \fancyhead[R]{Version 1.0.7}
  - \usepackage{fvextra}
  - \fvset{breaklines=true,breakanywhere=true}

colorlinks: true
linkcolor: blue
urlcolor: blue

highlight-style: tango