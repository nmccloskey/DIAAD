# DIAAD advanced settings
# Most users can leave this file unchanged.

# -------------------------------------------------------------------
# Tabularized transcripts
# -------------------------------------------------------------------

# Transcript table file name.
transcript_table_filename: transcript_tables.xlsx


# -------------------------------------------------------------------
# Unique identifiers
# -------------------------------------------------------------------

# Sample-level identifier column in spreadsheets/dataframes.
sample_id_column: sample_id

# Utterance-level identifier column in spreadsheets/dataframes.
utterance_id_column: utterance_id


# -------------------------------------------------------------------
# Reliability file conventions
# -------------------------------------------------------------------

# Tag used to identify transcription reliability files.
reliability_tag: "_reliability"

# Name of the folder containing transcription reliability files.
reliability_dirname: "reliability"


# -------------------------------------------------------------------
# CU coding
# -------------------------------------------------------------------

# Complete Utterance paradigms to include.
# Set to [] to use no paradigm-specific expansion.
cu_paradigms: [SAE, AAE]

# Exact CU sample-level coding filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
cu_samples_filename: cu_coding_by_sample_long.xlsx

# Exact CU utterance-level coding filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
cu_utts_filename: cu_coding_by_utterance.xlsx


# -------------------------------------------------------------------
# Word counting
# -------------------------------------------------------------------

# Exact word-count coding filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
word_count_filename: word_counting.xlsx

# Column containing utterance-level word counts.
word_count_column: word_count

# Exact word-count sample-level summary filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
wc_samples_filename: word_counting_by_sample.xlsx


# -------------------------------------------------------------------
# POWERS coding
# -------------------------------------------------------------------

# Exact POWERS coding filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
powers_coding_filename: powers_coding.xlsx

# Exact POWERS reliability coding filename.
# DIAAD searches recursively and errors if multiple exact matches exist.
powers_reliability_filename: powers_reliability_coding.xlsx

# spaCy model name for PSAIR NLPModel, for example:
# choose en_core_web_sm for speed
# or en_core_web_trf for accuracy
spacy_model_name: en_core_web_sm


# -------------------------------------------------------------------
# Rate analysis
# -------------------------------------------------------------------

# Exact filename containing speaking-time values for rate calculations.
# DIAAD searches recursively and errors if multiple exact matches exist.
speaking_time_filename: speaking_times.xlsx

# Column containing speaking-time values.
speaking_time_column: speaking_time


# -------------------------------------------------------------------
# Target vocabulary coverage
# -------------------------------------------------------------------

# Leave blank to use built-in resources.
# Set to a JSON file or directory to use custom resources.
target_vocabulary_resource_path: ""


# -------------------------------------------------------------------
# Digital conversational turns
# -------------------------------------------------------------------

# Exact filename containing DCT primary coding.
dct_coding_filename: "conversation_turns.xlsx"

# Exact filename containing DCT reliability coding.
dct_coding_reliability: "conversation_turns_reliability.xlsx"


# -------------------------------------------------------------------
# Project blinding
# -------------------------------------------------------------------

# Automatically apply blinding to coding files or analyses.
# (Ignored when blinding is called explicitly with encode/decode)
auto_blind: false

# Columns to blind when blinding is requested.
# Columns not present in a given file are skipped with a warning.
blind_columns:
  - sample_id

# -------------------------------------------------------------------
# Optional: metadata/codebook recovery for blinding
# -------------------------------------------------------------------
# Leave these as-is unless you need custom blinding behavior.

# Source from which metadata may be recovered for blinding / unblinding.
metadata_source: transcript_tables.xlsx

# Join keys used when recovering metadata.
id_columns:
  - sample_id
  - utterance_id

# If blank, blind codebooks are sought with internal contains-mode discovery.
# Otherwise, set one exact filename to require.
codebook_filename: ""
